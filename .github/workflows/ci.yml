name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "skills-ref/uv.lock"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: uv sync
      working-directory: skills-ref

    - name: Lint with Ruff
      run: uv run ruff check .
      working-directory: skills-ref

    - name: Check format with Ruff
      run: uv run ruff format --check .
      working-directory: skills-ref

    - name: Test with pytest
      run: uv run pytest
      working-directory: skills-ref
